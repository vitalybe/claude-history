name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  BIN_NAME: claude-history

jobs:
  nix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
      - name: Build Nix package
        run: nix build --no-link --print-build-logs

  build:
    needs: nix
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            platform: darwin-arm64
            use_cross: false
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform: linux-amd64
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Download ONNX Runtime
        env:
          ORT_VERSION: 1.24.2
        run: |
          case "${{ matrix.platform }}" in
            darwin-arm64) ort_platform="osx-arm64" ;;
            linux-amd64) ort_platform="linux-x64" ;;
            *) echo "Unsupported platform: ${{ matrix.platform }}" >&2; exit 1 ;;
          esac
          curl -L -o onnxruntime.tgz "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-${ort_platform}-${ORT_VERSION}.tgz"
          mkdir onnxruntime
          tar -xzf onnxruntime.tgz -C onnxruntime --strip-components=1
      - name: Build
        run: |
          build_args=(--release --locked --target ${{ matrix.target }} --features release-dynamic-ort)
          if [ "${{ matrix.use_cross }}" == "true" ]; then
            cross build "${build_args[@]}"
          else
            cargo build "${build_args[@]}"
          fi
      - name: Package
        run: |
          bin="target/${{ matrix.target }}/release/${BIN_NAME}"
          package="package"
          mkdir -p "$package/lib"
          cp "$bin" "$package/"
          find onnxruntime/lib -maxdepth 1 \( -type f -o -type l \) -name 'libonnxruntime*' -exec cp -P {} "$package/lib/" \;
          # Only strip on Linux to avoid corrupting macOS code signatures
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            strip "$package/${BIN_NAME}" || true
          fi
          archive="${BIN_NAME}-${{ matrix.platform }}.tar.gz"
          tar -C "$package" -czf "$archive" .
          shasum -a 256 "$archive" > "${BIN_NAME}-${{ matrix.platform }}.sha256"
      - name: Smoke test packaged binary
        run: |
          "$GITHUB_WORKSPACE/package/${BIN_NAME}" --version
          test -f "$GITHUB_WORKSPACE/package/lib/libonnxruntime.dylib" || test -f "$GITHUB_WORKSPACE/package/lib/libonnxruntime.so"
          test -f "$GITHUB_WORKSPACE/package/lib/libonnxruntime.1.24.2.dylib" || test -f "$GITHUB_WORKSPACE/package/lib/libonnxruntime.so.1.24.2"
      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.platform }}
          path: |
            ${{ env.BIN_NAME }}-${{ matrix.platform }}.tar.gz
            ${{ env.BIN_NAME }}-${{ matrix.platform }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          generate_release_notes: true
          files: |
            *.tar.gz
            *.sha256

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true
      - uses: actions/checkout@v5
        with:
          repository: raine/homebrew-claude-history
          token: ${{ secrets.RELEASE_TOKEN }}
          path: tap
      - name: Generate formula and push to tap
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          SHA_ARM=$(awk '{print $1}' claude-history-darwin-arm64.sha256)
          SHA_LINUX=$(awk '{print $1}' claude-history-linux-amd64.sha256)

          cat > tap/Formula/claude-history.rb << EOF
          class ClaudeHistory < Formula
            desc "Fuzzy-search Claude Code conversation history from the terminal"
            homepage "https://github.com/raine/claude-history"
            version "${VERSION}"
            license "MIT"

            on_macos do
              depends_on arch: :arm64

              url "https://github.com/raine/claude-history/releases/download/v${VERSION}/claude-history-darwin-arm64.tar.gz"
              sha256 "${SHA_ARM}"
            end

            on_linux do
              url "https://github.com/raine/claude-history/releases/download/v${VERSION}/claude-history-linux-amd64.tar.gz"
              sha256 "${SHA_LINUX}"
            end

            def install
              bin.install "claude-history"
              lib.install Dir["lib/*"]
              bin.install_symlink lib/"libonnxruntime.dylib" if OS.mac?
              bin.install_symlink lib/"libonnxruntime.so" if OS.linux?
            end

            test do
              assert_match version.to_s, shell_output("\#{bin}/claude-history --version")
            end
          end
          EOF
          sed -i 's/^          //' tap/Formula/claude-history.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-history.rb
          git commit -m "claude-history ${VERSION}"
          git pull --rebase
          git push
