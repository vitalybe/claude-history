name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  BIN_NAME: claude-history

jobs:
  nix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
      - name: Build Nix package
        run: nix build --no-link --print-build-logs

  build:
    needs: nix
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            platform: darwin-arm64
            use_cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-amd64
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" == "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi
      - name: Package
        run: |
          bin="target/${{ matrix.target }}/release/${BIN_NAME}"
          # Only strip on Linux to avoid corrupting macOS code signatures
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            strip "$bin" || true
          fi
          archive="${BIN_NAME}-${{ matrix.platform }}.tar.gz"
          tar -C "$(dirname "$bin")" -czf "$archive" ${BIN_NAME}
          shasum -a 256 "$archive" > "${BIN_NAME}-${{ matrix.platform }}.sha256"
      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.platform }}
          path: |
            ${{ env.BIN_NAME }}-${{ matrix.platform }}.tar.gz
            ${{ env.BIN_NAME }}-${{ matrix.platform }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          generate_release_notes: true
          files: |
            *.tar.gz
            *.sha256

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true
      - uses: actions/checkout@v5
        with:
          repository: raine/homebrew-claude-history
          token: ${{ secrets.RELEASE_TOKEN }}
          path: tap
      - name: Generate formula and push to tap
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          SHA_ARM=$(awk '{print $1}' claude-history-darwin-arm64.sha256)
          SHA_LINUX=$(awk '{print $1}' claude-history-linux-amd64.sha256)

          cat > tap/Formula/claude-history.rb << EOF
          class ClaudeHistory < Formula
            desc "Fuzzy-search Claude Code conversation history from the terminal"
            homepage "https://github.com/raine/claude-history"
            version "${VERSION}"
            license "MIT"

            on_macos do
              depends_on arch: :arm64

              url "https://github.com/raine/claude-history/releases/download/v${VERSION}/claude-history-darwin-arm64.tar.gz"
              sha256 "${SHA_ARM}"
            end

            on_linux do
              url "https://github.com/raine/claude-history/releases/download/v${VERSION}/claude-history-linux-amd64.tar.gz"
              sha256 "${SHA_LINUX}"
            end

            def install
              bin.install "claude-history"
            end

            test do
              assert_match version.to_s, shell_output("\#{bin}/claude-history --version")
            end
          end
          EOF
          sed -i 's/^          //' tap/Formula/claude-history.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-history.rb
          git commit -m "claude-history ${VERSION}"
          git pull --rebase
          git push
